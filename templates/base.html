<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Results Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <!-- Logo -->
                <div class="nav-logo">
                    <a href="/">📊 Results</a>
                </div>

                <!-- Hamburger Menu Toggle -->
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <!-- Navigation Links -->
                <ul class="nav-menu" id="navMenu">
                    <li><a href="/" class="nav-link {% block home_active %}{% endblock %}">Home</a></li>
                    <li><a href="/results" class="nav-link {% block results_active %}{% endblock %}">Results</a></li>
                    <li><a href="/graphs" class="nav-link {% block graphs_active %}{% endblock %}">Graphs</a></li>
                    <li><a href="/scraper" class="nav-link {% block scraper_active %}{% endblock %}">Scraper</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Student Results Platform. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
